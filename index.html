<style>
  /* ============================================================
     "Show up and belong" system — warm paper base, bold rectangular
     color blocks that commit to ONE fearless accent (turf green) as
     full-panel backgrounds + button fills, deep navy for dark photo /
     statement panels. Orange + yellow are demoted to tiny icon accents
     only. Oversized, confident, sentence-case display type. Real
     photography does the heavy lifting in big image blocks.
     ============================================================ */
  :root { --maxw: 1200px; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--paper-50); color: var(--navy-900); font-family: var(--font-body); }
  * { box-sizing: border-box; }
  img { display: block; }
  a { color: var(--green-700); text-decoration: none; }
  a:hover { color: var(--green-600); }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding-left: 24px; padding-right: 24px; }
  .section { padding: 78px 0; }
  @media (min-width: 780px) { .section { padding: 108px 0; } }

  /* ---- numbered kicker: (01) LABEL, matching the reference eyebrows ---- */
  .nkicker {
    display: inline-flex; align-items: center; gap: 11px;
    font-family: var(--font-display); font-weight: 800;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .nkicker .nk-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: var(--radius-full);
    background: var(--navy-950); color: var(--green-400);
    font-size: 11px; letter-spacing: 0;
  }
  .blk-green .nkicker .nk-num { background: var(--navy-950); color: var(--green-400); }

  /* ---- color-block section surfaces ---- */
  .blk-paper  { background: var(--paper-50);  color: var(--navy-900); }
  .blk-paper2 { background: var(--paper-100); color: var(--navy-900); }
  .blk-green  { background: var(--green-400); color: var(--navy-950); }
  .blk-navy   { background: var(--navy-950);  color: var(--paper-50); }
  .dark { background: var(--navy-950); color: var(--paper-50); }

  /* ---- oversized, confident, SENTENCE-CASE display type ---- */
  .d-huge {
    font-family: var(--font-display); font-weight: 800;
    font-size: clamp(50px, 9vw, 118px); line-height: 0.92;
    letter-spacing: -0.035em; margin: 0; text-wrap: balance;
  }
  .d-big {
    font-family: var(--font-display); font-weight: 800;
    font-size: clamp(34px, 5.6vw, 68px); line-height: 0.98;
    letter-spacing: -0.03em; margin: 0; text-wrap: balance;
  }
  .d-mid {
    font-family: var(--font-display); font-weight: 800;
    font-size: clamp(24px, 3vw, 36px); line-height: 1.04;
    letter-spacing: -0.02em; margin: 0; text-wrap: balance;
  }
  .ital { font-style: italic; }
  .lede { font: var(--text-body-lg); font-size: clamp(17px, 1.7vw, 21px); line-height: 1.55; }

  /* ---- giant statement numbers (Founded at, hero stats) ---- */
  .stat-num {
    font-family: var(--font-display); font-weight: 800;
    font-size: clamp(56px, 10vw, 128px); line-height: 0.82;
    letter-spacing: -0.05em; font-variant-numeric: tabular-nums;
  }
  .stat-lab {
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.02em; font-size: clamp(13px, 1.3vw, 15px); line-height: 1.2;
  }

  /* ---- pill button helper (references use fully-rounded CTAs) ---- */
  .btn-pill > button, button.btn-pill { border-radius: var(--radius-full) !important; }

  /* ---- overlapping member-avatar cluster ---- */
  .avatar-stack { display: inline-flex; align-items: center; }
  .avatar-stack > * { margin-left: -12px; box-shadow: 0 0 0 3px var(--navy-950); border-radius: var(--radius-full); }
  .avatar-stack > *:first-child { margin-left: 0; }
  .avatar-stack.on-light > * { box-shadow: 0 0 0 3px var(--paper-50); }
  .avatar-stack.on-green > * { box-shadow: 0 0 0 3px var(--green-400); }

  /* ---- numbered "how to join" step ---- */
  .step-num {
    font-family: var(--font-display); font-weight: 800;
    font-size: 15px; color: var(--green-400); letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }

  /* ---- benefit icon tile ---- */
  .benefit-ico {
    width: 44px; height: 44px; border-radius: var(--radius-md); flex-shrink: 0;
    background: var(--navy-950); color: var(--green-400);
    display: flex; align-items: center; justify-content: center;
  }

  /* ---- filter tabs (dark active pill on light) ---- */
  .ftabs { display: flex; gap: 6px; flex-wrap: wrap; background: var(--paper-100); padding: 5px; border-radius: var(--radius-full); }
  .ftab {
    border: none; cursor: pointer; padding: 9px 18px; border-radius: var(--radius-full);
    font: var(--text-label-md); font-weight: 700; background: transparent; color: var(--navy-600);
    transition: background var(--duration-base) var(--ease-out), color var(--duration-base) var(--ease-out); white-space: nowrap;
  }
  .ftab.on { background: var(--navy-950); color: #fff; }

  /* nav */
  .nav-links { display: none; }
  @media (min-width: 900px) { .nav-links { display: flex; gap: 24px; align-items: center; } }

  /* generic responsive grids */
  .grid { display: grid; gap: 18px; }
  .cols-2 { grid-template-columns: minmax(0, 1fr); }
  .cols-3 { grid-template-columns: minmax(0, 1fr); }
  .cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  @media (min-width: 720px) {
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }

  /* countdown — big bold numerals, no cage */
  .cd { display: flex; gap: 28px; flex-wrap: wrap; }
  .cd-cell { text-align: left; }
  .cd-num { font-family: var(--font-display); font-weight: 800; font-size: clamp(40px, 6vw, 68px); line-height: 0.9; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
  .cd-lab { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; opacity: 0.7; }

  .hero-h1 { margin: 0; color: #fff; }
  .hero-one { display:block; }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .6s var(--ease-out), transform .6s var(--ease-out); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

  .lb-backdrop { position: fixed; inset: 0; z-index: 90; background: rgba(5,7,13,.92); display:flex; align-items:center; justify-content:center; padding: 24px; }

  /* hide scrollbar on chip rows */
  .chiprow { display:flex; gap:10px; overflow-x:auto; -ms-overflow-style:none; scrollbar-width:none; padding-bottom: 4px; }
  .chiprow::-webkit-scrollbar { display:none; }

  /* ---- solid-fill activity marquee ---- */
  .marquee { display:flex; width:100%; }
  .marquee__track { display:flex; gap:10px; flex-shrink:0; padding-right:10px; align-items:center; animation: marquee-scroll 34s linear infinite; will-change: transform; }
  .marquee:hover .marquee__track { animation-play-state: paused; }
  @keyframes marquee-scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  @media (prefers-reduced-motion: reduce) { .marquee__track { animation: none; } }
  /* Energetic condensed display face, reserved for the marquee only. */
  .tick {
    display: inline-flex; align-items: center; white-space: nowrap;
    font-family: "Anton", var(--font-display); font-weight: 400; text-transform: uppercase;
    font-size: clamp(11px, 1.1vw, 14px); letter-spacing: 0.03em;
    padding: 5px 15px; border-radius: 999px;
  }
</style>
