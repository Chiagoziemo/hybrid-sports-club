<style>
  :root { --maxw: 1200px; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--paper-50); color: var(--navy-900); font-family: var(--font-body); }
  * { box-sizing: border-box; }
  img { display: block; }
  a { color: var(--green-700); text-decoration: none; }
  a:hover { color: var(--green-600); }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding-left: 24px; padding-right: 24px; }
  .section { padding: 78px 0; }
  @media (min-width: 780px) { .section { padding: 108px 0; } }

  .nkicker { display: inline-flex; align-items: center; gap: 11px; font-family: var(--font-display); font-weight: 800; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .nkicker .nk-num { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: var(--radius-full); background: var(--navy-950); color: var(--green-400); font-size: 11px; letter-spacing: 0; }
  .kicker-plain { font-family: var(--font-display); font-weight: 800; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }

  .blk-paper  { background: var(--paper-50);  color: var(--navy-900); }
  .blk-paper2 { background: var(--paper-100); color: var(--navy-900); }
  .blk-green  { background: var(--green-400); color: var(--navy-950); }
  .blk-navy   { background: var(--navy-950);  color: var(--paper-50); }
  .dark { background: var(--navy-950); color: var(--paper-50); }

  .d-huge { font-family: var(--font-display); font-weight: 800; font-size: clamp(42px, 8vw, 100px); line-height: 0.94; letter-spacing: -0.035em; margin: 0; text-wrap: balance; }
  .d-big { font-family: var(--font-display); font-weight: 800; font-size: clamp(30px, 5vw, 60px); line-height: 1; letter-spacing: -0.03em; margin: 0; text-wrap: balance; }
  .lede { font: var(--text-body-lg); font-size: clamp(17px, 1.7vw, 21px); line-height: 1.55; }

  .btn-pill > button, button.btn-pill { border-radius: var(--radius-full) !important; }

  .avatar-stack { display: inline-flex; align-items: center; }
  .avatar-stack > * { margin-left: -12px; box-shadow: 0 0 0 3px var(--navy-950); border-radius: var(--radius-full); }
  .avatar-stack > *:first-child { margin-left: 0; }

  .benefit-ico { width: 44px; height: 44px; border-radius: var(--radius-md); flex-shrink: 0; background: var(--navy-950); color: var(--green-400); display: flex; align-items: center; justify-content: center; }

  .grid { display: grid; gap: 18px; }
  .cols-2 { grid-template-columns: minmax(0, 1fr); }
  .cols-3 { grid-template-columns: minmax(0, 1fr); }
  @media (min-width: 720px) { .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); } .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

  .cd { display: flex; gap: 28px; flex-wrap: wrap; }
  .cd-cell { text-align: left; }
  .cd-num { font-family: var(--font-display); font-weight: 800; font-size: clamp(40px, 6vw, 68px); line-height: 0.9; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
  .cd-lab { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; opacity: 0.7; }

  .meta-chip { display: inline-flex; align-items: center; gap: 8px; font: var(--text-label-md); font-weight: 700; color: #fff; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.24); padding: 8px 16px; border-radius: var(--radius-full); backdrop-filter: blur(6px); }

  .timeline { display: flex; flex-direction: column; }
  .tl-row { display: grid; grid-template-columns: 84px 24px 1fr; gap: 8px; }
  @media (min-width: 640px) { .tl-row { grid-template-columns: 120px 24px 1fr; } }
  .tl-time { font-family: var(--font-display); font-weight: 800; font-size: 15px; color: var(--green-400); padding-top: 2px; }
  .tl-rail { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 12px; height: 12px; border-radius: var(--radius-full); background: var(--green-400); flex-shrink: 0; margin-top: 4px; }
  .tl-line { width: 2px; flex: 1; background: var(--border-subtle-dark); margin: 4px 0; }
  .tl-body { padding-bottom: 32px; }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .6s var(--ease-out), transform .6s var(--ease-out); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }
</style>
