<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--navy-950); font-family: var(--font-body); }
  img { display: block; }
  a { color: var(--green-400); text-decoration: none; }
  a:hover { color: var(--green-300); }

  .kicker { font-family: var(--font-display); font-weight: 800; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; display: inline-block; }
  .screen-title { font-family: var(--font-display); font-weight: 800; font-size: clamp(30px, 8.5vw, 40px); line-height: 0.98; letter-spacing: -0.03em; color: #fff; }
  .pillbtn { border-radius: var(--radius-full) !important; }
  .grid { display: grid; gap: 12px; }
  .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

  /* Mobile-first app shell — a fixed-width column that reads like a phone's
     content area even on a wide desktop viewport, since this surface is
     used almost exclusively on members' phones. */
  html, body { height: 100%; }
  .app-shell {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    margin: 0 auto;
    background: var(--navy-950);
    overflow: hidden;
    box-shadow: 0 0 0 1px var(--border-subtle-dark);
  }
  .app-scroll {
    position: absolute; inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 481px) {
    body { background: var(--navy-900); }
    .app-shell { box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-subtle-dark); }
  }
</style>
